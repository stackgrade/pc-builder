name: Daily Price Scraping

on:
  schedule:
    # Run daily at 06:00 UTC (08:00 Swedish time)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git diff
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install curl_cffi
        
      - name: Run scraper
        run: python3 scripts/scrape_komplett_v2.py
      
      - name: Merge with metadata
        run: |
          # Backup current prices (with metadata) if not already backed up
          if [ ! -f data/prices_mock.json ]; then
            git show HEAD:data/prices.json > data/prices_mock.json
          fi
          # Copy scraped to temp
          cp data/prices.json data/prices_scraped.json
          # Restore mock with metadata
          cp data/prices_mock.json data/prices.json
          # Merge
          python3 scripts/merge_prices.py
      
      - name: Check for changes
        id: git_status
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          git fetch origin main
          if git diff --exit-code origin/main -- data/prices.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No price changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Price changes detected!"
            git diff --stat data/prices.json
          fi
      
      - name: Commit and push changes
        if: steps.git_status.outputs.changed == 'true'
        run: |
          git add data/prices.json data/prices_scraped.json 2>/dev/null || true
          git add data/prices.json
          git commit -m "Auto-update prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push