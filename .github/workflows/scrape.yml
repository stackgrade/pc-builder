name: Daily Price Scraping

on:
  schedule:
    # Run daily at 06:00 UTC (08:00 Swedish time)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install curl_cffi
        
      - name: Create data directory
        run: mkdir -p data
      
      - name: Run scraper
        run: python3 scripts/scrape_komplett_v2.py
      
      - name: Check for changes
        id: git_status
        run: |
          if git diff --exit-code data/prices.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No price changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Price changes detected!"
            git diff --stat data/prices.json
          fi
      
      - name: Commit and push changes
        if: steps.git_status.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/prices.json
          git commit -m "Auto-update prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push